name: CI

on:
  push:
    branches: [ main, master, "dev/**", "feature/**" ]
  pull_request:
    branches: [ main, master, "dev/**", "feature/**" ]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: uv sync --all-extras --dev

      - name: Lint & Format (Ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type Check (Mypy)
        run: uv run mypy .

      - name: Run Unit Tests
        run: uv run pytest tests/unit/ tests/nitpick/unit/

      - name: Install Playwright Browsers
        env:
          DEBIAN_FRONTEND: noninteractive
        run: uv run playwright install --with-deps chromium

      - name: Run E2E Tests
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -d "tests/e2e" ] && [ "$(ls -A tests/e2e)" ]; then
            if [ -z "$JULES_API_KEY" ] && [ -z "$OPENROUTER_API_KEY" ]; then
              echo "Skipping E2E tests: API keys not configured in GitHub Secrets."
            else
              uv run pytest tests/e2e/
            fi
          else
            echo "No E2E tests found, skipping."
          fi
